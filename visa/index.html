<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizdown Converter</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="converter/css/converter-styles.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="image/icon.png">
</head>
<body>

  <!-- Header / Navbar -->
  <nav class="navbar">
    <div class="brand">
      <div class="logo-icon">Q</div>
      <h1>Quizdown Converter</h1>
    </div>
    
    <div class="nav-actions">
      <!-- Animated Hint with Close Button -->
      <div class="onboarding-hint" id="onboardingHint">
        <span>New here? Start Guide &rarr;</span>
        <div class="hint-close" onclick="document.getElementById('onboardingHint').style.display='none'" title="Dismiss">
          &times;
        </div>
      </div>
      <a href="help.html" target="_blank" rel="noopener noreferrer" class="help-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        Help Guide
      </a>
    </div>
  </nav>

  <div class="main-container">
    <!-- Left sidebar for saved quizzes -->
    <aside class="storage-sidebar" id="storageSidebar">
      <div class="sidebar-header">
        <h3>Library</h3>
        <span class="badge" id="savedCount">0</span>
      </div>
      
      <div class="saved-quizzes-container">
        <div class="search-container">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" placeholder="Search quizzes...">
        </div>
        <div id="savedQuizzesList">
          <!-- Saved quizzes will be loaded here -->
           <div class="empty-state">No saved quizzes yet.</div>
        </div>
      </div>
      <div class="resize-handle" id="resizeHandle"></div>
    </aside>
    
    <!-- Main content area -->
    <main class="content-area">
      
      <!-- Top Toolbar (Language, Settings & Main Actions) -->
      <div class="toolbar top-toolbar">
        <div class="left-group" style="display: flex; gap: 15px; align-items: center;">
            <div class="language-group">
              <label for="language-select">Interface:</label>
              <div class="select-wrapper">
                <select id="language-select">
                  <option value="en">English</option>
                  <option value="fi">Finnish</option>
                </select>
              </div>
            </div>
            
            <!-- Compact Mode Checkbox -->
            <div class="setting-group" style="display: flex; align-items: center; gap: 6px; border-left: 1px solid #e2e8f0; padding-left: 15px;">
                <input type="checkbox" id="compactMode" style="margin:0; cursor: pointer;">
                <label for="compactMode" style="margin:0; cursor: pointer; font-size: 0.9rem; user-select: none; color: #334155;">Compact Mode (2-Col)</label>
            </div>
        </div>

        <div class="primary-actions">
           <!-- Link to Visual Editor -->
           <a href="editor.html" id="openBuilderBtn" class="btn btn-secondary" style="text-decoration: none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            Visual Builder
          </a>

           <button id="saveBtn" class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Save
          </button>
          
          <button id="runBtn" class="btn btn-primary" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Generate HTML
          </button>
           <button id="runBtnLatex" class="btn btn-primary" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            Generate LaTeX
          </button>
        </div>
      </div>

      <div class="editor-wrapper">
        <textarea id="quizdownCode" placeholder="Start typing your quiz here...
---
title: My Quiz
---
#Q
What is 2+2?
- [x] 4
- [ ] 5"></textarea>
      </div>

      <!-- Bottom Toolbar (Export Options) -->
      <div class="toolbar bottom-toolbar">
        <div class="export-group">
          <span class="group-label">HTML Export</span>
          <button id="copyBtn" class="btn btn-sm">Copy Code</button>
          <button id="downloadBtn" class="btn btn-sm">Download .html</button>
        </div>
        <div class="export-separator"></div>
        <div class="export-group">
          <span class="group-label">LaTeX / PDF Export</span>
          <button id="copyBtnQ" class="btn btn-sm">Copy Q</button>
          <button id="copyBtnQA" class="btn btn-sm">Copy Q&A</button>
          <button id="downloadBtnQ" class="btn btn-sm">DL Questions</button>
          <button id="downloadBtnQA" class="btn btn-sm">DL Q&A</button>
        </div>
        <div class="export-separator"></div>
        <div class="export-group">
          <span class="group-label">Share</span>
          <button id="share-quiz" class="btn btn-sm">Share Quiz</button>
          <input type="text" id="share-link" readonly placeholder="Shareable link will appear here">
          <button id="copy-share-link" class="btn btn-sm">Copy Link</button>
        </div>
      </div>
    </main>
  </div>

  <!-- LZ-String Library for URL Compression -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  
  <!-- Application Scripts -->
  <script src="converter/js/quiz-parser.js"></script>
  <script src="converter/js/html-generator.js"></script>
  <script src="converter/js/latex-generator.js"></script>
  <script src="converter/js/storage.js"></script>
  <script src="converter/js/ui.js"></script>
</body>
</html>
