<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Builder | Visual Editor</title>
  
  <!-- 1. LINK TO YOUR UNIFIED CSS FILE -->
  <link rel="stylesheet" href="converter/css/converter-styles.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="image/icon.png">

</head>
<body class="editor-page">

  <nav class="navbar">
    <div class="brand">
      <div class="logo-icon">Q</div>
      <h1>Quiz Builder</h1>
    </div>
    
    <div class="nav-actions">
      <a href="index.html" class="btn btn-secondary" style="text-decoration: none; margin-right: 10px;">
        &larr; Go to Converter
      </a>
      <a href="help.html" target="_blank" class="help-link">Help</a>
    </div>
  </nav>

  <div class="main-container">
    <aside class="storage-sidebar" id="storageSidebar">
      <div class="sidebar-header">
        <h3>My Library</h3>
        <span class="badge" id="savedCount">0</span>
      </div>
      <div class="saved-quizzes-container">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search saved quizzes...">
        </div>
        <div id="savedQuizzesList"></div>
      </div>
      <div class="resize-handle" id="resizeHandle"></div>
    </aside>
    
    <main class="content-area builder-area">
      
      <!-- TOOLBAR: Now positioned at the bottom via the <style> block above -->
      <div class="toolbar top-toolbar sticky-toolbar">
        <div class="primary-actions">
           <button id="saveBtn" class="btn btn-primary">
             Save Progress
          </button>
        </div>
        <div style="font-size: 0.85rem; color: #666; font-weight: 500;">
        </div>
      </div>

      <div class="builder-canvas">
        <div class="visual-card metadata-card">
            <h3>Quiz Settings</h3>
            <div class="form-group">
                <label>Quiz Title</label>
                <input type="text" id="visual-title" placeholder="Enter quiz title (e.g. History Final)" style="font-size:1.1rem; padding:10px;">
            </div>
            <!-- Hidden textarea for synchronization -->
            <textarea id="quizdownCode" style="display:none;"></textarea>
        </div>

        <div id="visual-questions-container"></div>

        <div class="add-question-wrapper">
            <button class="btn btn-primary btn-large" onclick="window.visualAddQuestion()">
                + Add New Question
            </button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  
  <script src="converter/js/quiz-parser.js"></script>
  <script src="editor/js/visual-editor.js"></script> 
  <script src="converter/js/storage.js"></script>
  <script src="editor/js/builder.js"></script>
</body>
</html>
